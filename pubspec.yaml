name: rider_flow
description: RiderFlow - Courier Franchise Management System app built with Flutter and Firebase.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.3.6
  go_router: ^10.0.0
  google_fonts: ^6.1.0
  fl_chart: ^0.63.0
  uuid: ^4.0.0
  intl: ^0.18.1
  shared_preferences: ^2.2.0
  geolocator: ^10.1.0
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
